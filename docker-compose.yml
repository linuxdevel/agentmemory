services:
  iii-engine:
    image: iiidev/iii:latest
    ports:
      - "127.0.0.1:49134:49134"
      - "127.0.0.1:3111:3111"
      - "127.0.0.1:3112:3112"
      - "127.0.0.1:9464:9464"
    volumes:
      - iii-data:/home/nonroot/data
      - ./iii-config.docker.yaml:/app/config.yaml:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "/app/iii", "worker", "list"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  iii-data:
